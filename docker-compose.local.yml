services:
  backend:
    image: open-ai-canvas-backend:local
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
    environment:
      CANVAS_BACKEND_ADDR: ":8080"
      CANVAS_BACKEND_DATA_DIR: /data
      CANVAS_DATABASE_DRIVER: ${CANVAS_DATABASE_DRIVER:-sqlite}
      DATABASE_URL: ${DATABASE_URL:-}
      REDIS_URL: ${REDIS_URL:-}
      CANVAS_REGISTRATION_ENABLED: ${CANVAS_REGISTRATION_ENABLED:-false}
      CANVAS_ALLOW_PRIVATE_UPSTREAMS: ${CANVAS_ALLOW_PRIVATE_UPSTREAMS:-false}
      CANVAS_CORS_ORIGINS: ${CANVAS_CORS_ORIGINS:-http://localhost:3000}
      GIN_MODE: release
    volumes:
      - backend-data:/data
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./backend
          ignore:
            - data/

  web:
    image: open-ai-canvas-web:local
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./web
          ignore:
            - node_modules/
            - dist/
            - tsconfig.tsbuildinfo
        - action: rebuild
          path: ./Dockerfile
        - action: rebuild
          path: ./nginx.conf
        - action: rebuild
          path: ./VERSION
        - action: rebuild
          path: ./CHANGELOG.md

volumes:
  backend-data:
