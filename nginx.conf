map $http_x_forwarded_proto $canvas_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

log_format canvas_no_query '$remote_addr - $remote_user [$time_local] '
                           '"$request_method $uri $server_protocol" $status $body_bytes_sent '
                           '"$http_referer" "$http_user_agent"';

server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    # 业务配置最高允许 999MB；网关保留少量 multipart 开销，避免保存出无法生效的上限。
    client_max_body_size 1024m;
    access_log /var/log/nginx/access.log canvas_no_query;
    add_header Referrer-Policy "no-referrer" always;
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types application/json application/javascript text/css text/plain image/svg+xml;

    location ^~ /api/public/canvas-shares/ {
        access_log off;
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $canvas_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $canvas_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 3600s;
    }

    location = /oauth/linuxdo/callback {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $canvas_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 30s;
    }

    location = /assets {
        try_files /index.html =404;
    }

    location = /assets/ {
        try_files /index.html =404;
    }

    location ^~ /share/canvas/ {
        access_log off;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
